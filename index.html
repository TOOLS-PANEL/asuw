<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0f172a">
    <title>Xrans Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            line-height: 1.5;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: #0f0f1a;
            z-index: 1000;
            transition: left 0.3s;
            overflow-y: auto;
            border-right: 1px solid #1e293b;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 1px solid #1e293b;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3b82f6;
            margin-bottom: 12px;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.7;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }

        .nav-item.active, .nav-item:hover {
            color: white;
            background: rgba(59,130,246,0.2);
            border-left: 2px solid #3b82f6;
        }

        .nav-item i {
            width: 20px;
            font-size: 14px;
        }

        .social-links {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            padding: 16px;
            border-top: 1px solid #1e293b;
        }

        .social-links a {
            color: rgba(255,255,255,0.7);
            font-size: 20px;
            margin: 0 12px;
        }

        /* Main Content */
        .main-content {
            min-height: 100vh;
            padding: 16px;
            padding-top: 70px;
        }

        /* Menu Toggle */
        .menu-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            background: #0f0f1a;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            border: 1px solid #1e293b;
        }

        /* Sections */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 28px 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #1e293b;
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .hero p {
            font-size: 14px;
            opacity: 0.8;
        }

        /* Card */
        .card {
            background: #0f0f1a;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1e293b;
        }

        .card h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .card p {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
        }

        /* Section Title */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .product-card {
            background: #0f0f1a;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #1e293b;
            cursor: pointer;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #1e293b;
        }

        .product-info {
            padding: 12px;
        }

        .product-name {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 16px;
            font-weight: 800;
            color: #3b82f6;
            margin: 6px 0;
        }

        .product-desc {
            font-size: 12px;
            color: #94a3b8;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0f0f1a;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #1e293b;
        }

        .modal-product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .modal-product-name {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .modal-product-price {
            font-size: 24px;
            font-weight: 800;
            color: #3b82f6;
            margin: 12px 0;
        }

        .buy-btn {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }

        .waiting-message {
            background: #1e293b;
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
            text-align: center;
            font-size: 12px;
            display: none;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            background: #0f0f1a;
            border-radius: 16px;
        }

        .empty-state i {
            font-size: 40px;
            color: #3b82f6;
            margin-bottom: 12px;
        }

        .empty-state h3 {
            font-size: 16px;
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 12px;
            color: #94a3b8;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 2001;
            transition: all 0.3s;
            opacity: 0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .close-modal {
            float: right;
            background: #1e293b;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Admin Response */
        .admin-response {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #1e293b;
        }

        .admin-response h4 {
            font-size: 12px;
            margin-bottom: 8px;
            color: #3b82f6;
        }

        .admin-response-img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 8px;
        }

        .admin-response-text {
            background: #1e293b;
            padding: 10px;
            border-radius: 12px;
            font-size: 13px;
            margin-top: 8px;
        }

        /* Desktop */
        @media (min-width: 769px) {
            .sidebar {
                left: 0 !important;
            }
            .menu-toggle {
                display: none !important;
            }
            .sidebar-overlay {
                display: none !important;
            }
            .main-content {
                margin-left: 260px;
                padding: 30px;
                padding-top: 30px;
            }
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            .hero h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">
    <i class="fas fa-bars"></i>
</button>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img id="profileImg" class="profile-img" src="https://ui-avatars.com/api/?background=3b82f6&color=fff&size=90&name=Xrans" alt="Profile">
        <h2 id="profileName">Xrans Official</h2>
        <p id="profileTitle">Digital Creator</p>
    </div>

    <div class="nav-menu">
        <a href="#" class="nav-item active" data-section="home"><i class="fas fa-home"></i> Home</a>
        <a href="#" class="nav-item" data-section="portfolio"><i class="fas fa-briefcase"></i> Portofolio</a>
        <a href="#" class="nav-item" data-section="products"><i class="fas fa-box"></i> My Product</a>
    </div>

    <div class="social-links">
        <a href="https://t.me/xrans_offc" target="_blank"><i class="fab fa-telegram"></i></a>
    </div>
</div>

<div class="main-content">
    <div id="home" class="section active">
        <div class="hero">
            <h1 id="heroTitle">Xrans Official</h1>
            <p id="heroDesc">Digital Creator</p>
        </div>
        <div class="card">
            <h2>Tentang Saya</h2>
            <p>Digital creator yang berdedikasi untuk memberikan produk dan layanan terbaik.</p>
        </div>
    </div>

    <div id="portfolio" class="section">
        <h2 class="section-title">Portofolio</h2>
        <div id="portfolioGrid" class="products-grid"></div>
    </div>

    <div id="products" class="section">
        <h2 class="section-title">My Product</h2>
        <div id="productsGrid" class="products-grid"></div>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <div style="text-align: right;"><span class="close-modal" onclick="closeModal()">&times;</span></div>
        <div id="modalContent"></div>
        <div id="waitingMessage" class="waiting-message">Mohon tunggu, admin sedang memproses...</div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let currentProduct = null;
    let deviceId = null;
    let pollingInterval = null;

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function getDeviceId() {
        let id = localStorage.getItem('device_id');
        if (!id) {
            id = 'device_' + Math.random().toString(36).substr(2, 12) + '_' + Date.now();
            localStorage.setItem('device_id', id);
        }
        return id;
    }

    async function getPublicIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch(e) {
            return 'Unknown';
        }
    }

    deviceId = getDeviceId();

    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            e.preventDefault();
            const section = item.dataset.section;
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            item.classList.add('active');
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            if (window.innerWidth <= 768) closeSidebar();
        });
    });

    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const menuToggle = document.getElementById('menuToggle');

    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
    menuToggle.onclick = () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    overlay.onclick = closeSidebar;

    // Load data dengan timestamp agar tidak cache
    async function loadData() {
        try {
            const res = await fetch('/api/get-data?_=' + Date.now());
            const data = await res.json();
            
            if (data.profileImage) document.getElementById('profileImg').src = data.profileImage;
            if (data.profileName) {
                document.getElementById('profileName').textContent = data.profileName;
                document.getElementById('heroTitle').textContent = data.profileName;
            }
            if (data.profileTitle) {
                document.getElementById('profileTitle').textContent = data.profileTitle;
                document.getElementById('heroDesc').textContent = data.profileTitle;
            }
            
            const productsGrid = document.getElementById('productsGrid');
            if (data.products && data.products.length > 0) {
                productsGrid.innerHTML = data.products.map(p => `
                    <div class="product-card" onclick='openProduct(${JSON.stringify(p)})'>
                        <img class="product-image" src="${p.image || 'https://via.placeholder.com/400x160?text=Product'}" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-name">${escapeHtml(p.name)}</div>
                            <div class="product-price">Rp ${p.price.toLocaleString()}</div>
                            <div class="product-desc">${escapeHtml(p.description || '')}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                productsGrid.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><h3>Belum Ada Produk</h3><p>Tambahkan via bot Telegram</p></div>';
            }
            
            const portfolioGrid = document.getElementById('portfolioGrid');
            if (data.portfolios && data.portfolios.length > 0) {
                portfolioGrid.innerHTML = data.portfolios.map(p => `
                    <div class="product-card">
                        <img class="product-image" src="${p.image || 'https://via.placeholder.com/400x160?text=Portfolio'}" alt="${p.title}">
                        <div class="product-info">
                            <div class="product-name">${escapeHtml(p.title)}</div>
                            <div class="product-desc">${escapeHtml(p.description || '')}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                portfolioGrid.innerHTML = '<div class="empty-state"><i class="fas fa-images"></i><h3>Belum Ada Portofolio</h3><p>Tambahkan via bot Telegram</p></div>';
            }
        } catch(e) { console.error(e); }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function openProduct(product) {
        currentProduct = product;
        const modal = document.getElementById('productModal');
        document.getElementById('modalContent').innerHTML = `
            <img class="modal-product-img" src="${product.image || 'https://via.placeholder.com/400x180?text=Product'}" alt="${product.name}">
            <h2 class="modal-product-name">${escapeHtml(product.name)}</h2>
            <div class="modal-product-price">Rp ${product.price.toLocaleString()}</div>
            <p style="color:#94a3b8; font-size:14px;">${escapeHtml(product.description || 'Tidak ada deskripsi')}</p>
            <button class="buy-btn" onclick="buyProduct()"><i class="fas fa-shopping-cart"></i> Beli Sekarang</button>
        `;
        document.getElementById('waitingMessage').style.display = 'none';
        modal.classList.add('active');
    }

    async function buyProduct() {
        if (!currentProduct) return;
        const buyBtn = document.querySelector('.buy-btn');
        buyBtn.disabled = true;
        buyBtn.innerHTML = '<span class="loading-spinner"></span> Memproses...';
        
        const ip = await getPublicIP();
        const orderData = {
            product: currentProduct,
            deviceId: deviceId,
            ipAddress: ip,
            userAgent: navigator.userAgent,
            timestamp: new Date().toISOString()
        };
        
        try {
            const res = await fetch('/api/send-to-customer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
            const result = await res.json();
            if (result.success) {
                document.getElementById('waitingMessage').style.display = 'block';
                buyBtn.style.display = 'none';
                showToast('Pesanan terkirim! Menunggu admin...');
                startPolling();
            } else {
                showToast('Gagal, coba lagi');
                buyBtn.disabled = false;
                buyBtn.innerHTML = '<i class="fas fa-shopping-cart"></i> Beli Sekarang';
            }
        } catch(e) {
            showToast('Error: ' + e.message);
            buyBtn.disabled = false;
            buyBtn.innerHTML = '<i class="fas fa-shopping-cart"></i> Beli Sekarang';
        }
    }

    function startPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(async () => {
            try {
                const res = await fetch(`/api/get-response?deviceId=${deviceId}&_=${Date.now()}`);
                const data = await res.json();
                if (data.hasResponse) {
                    clearInterval(pollingInterval);
                    const modalContent = document.getElementById('modalContent');
                    if (!modalContent.querySelector('.admin-response')) {
                        let html = '<div class="admin-response"><h4>Respons Admin:</h4>';
                        if (data.image) html += `<img class="admin-response-img" src="${data.image}">`;
                        if (data.text) html += `<div class="admin-response-text">${escapeHtml(data.text)}</div>`;
                        html += '</div>';
                        modalContent.insertAdjacentHTML('beforeend', html);
                        showToast('Admin telah merespons!');
                    }
                }
            } catch(e) {}
        }, 3000);
    }

    function closeModal() {
        document.getElementById('productModal').classList.remove('active');
        if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
    }

    document.getElementById('productModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('productModal')) closeModal();
    });

    loadData();
    setInterval(loadData, 8000);
</script>
</body>
</html>
